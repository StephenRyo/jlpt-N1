let currentPage = 0;
const pageSize = 30; 

function buildTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  const start = currentPage * pageSize;
  const end = Math.min(start + pageSize, DATA.length);
  const items = DATA.slice(start, end);

  document.getElementById('pageInfo').innerText = `${currentPage + 1} / ${Math.ceil(DATA.length/pageSize)}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = end >= DATA.length;

  items.forEach((item, index) => {
    const tr = document.createElement('tr');
    
    const tdId = document.createElement('td');
    tdId.className = 'id-cell';
    tdId.textContent = item[0];
    tr.appendChild(tdId);

    const tdWord = document.createElement('td');
    tdWord.className = 'word-cell';
    tdWord.innerHTML = `
      <div class="word-jp">${item[1]}</div>
      <div class="example-zh">译文：${item[4]}</div>
    `;
    tr.appendChild(tdWord);

    const tdAnswer = document.createElement('td');
    tdAnswer.className = 'answer-cell';
    tdAnswer.innerHTML = `
      <button class="reveal-btn">显示答案</button>
      <div class="answer-box">
        <span class="usage-tag">接续/用法</span>
        <div class="grammar-rule">${item[2]}</div>
        <span class="usage-tag" style="background:#e8f5e9; color:#2e7d32;">含义</span><br>
        <div class="grammar-mean">${item[3]}</div>
      </div>
    `;

    const btn = tdAnswer.querySelector('.reveal-btn');
    const box = tdAnswer.querySelector('.answer-box');
    const zh = tdWord.querySelector('.example-zh');

    btn.onclick = () => {
      const isVis = box.classList.toggle('visible');
      zh.classList.toggle('visible', isVis);
      btn.textContent = isVis ? '隐藏' : '显示答案';
    };

    tr.appendChild(tdAnswer);
    tbody.appendChild(tr);
  });
}

function changePage(step) { currentPage += step; buildTable(); window.scrollTo(0,0); }

document.getElementById('revealAllBtn').onclick = () => {
  document.querySelectorAll('.answer-box, .example-zh').forEach(el => el.classList.add('visible'));
  document.querySelectorAll('.reveal-btn').forEach(el => el.textContent = '隐藏');
};

document.getElementById('hideAllBtn').onclick = () => {
  document.querySelectorAll('.answer-box, .example-zh').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('.reveal-btn').forEach(el => el.textContent = '显示答案');
};

buildTable();
</script>
