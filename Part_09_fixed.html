.tool-btn-outline { background: transparent; color: var(--muted); border: 1.5px solid var(--border); padding: .3rem .9rem; border-radius: 2rem; font-size: .75rem; cursor: pointer; transition: all .2s; }

.table-wrap { overflow-x: auto; padding-bottom: 80px; }
table { width: 100%; border-collapse: collapse; }
thead th { background: var(--bg2); color: var(--muted); font-weight: 500; font-size: .68rem; letter-spacing: .1em; padding: .55rem 1rem; text-align: left; border-bottom: 1.5px solid var(--border); }

.answer-box { display: none; margin-top: 8px; padding-left: 10px; border-left: 2px solid var(--gold); }

const ANNOT_KEY = 'n1_annot_p9_final';
let _annotMap = JSON.parse(localStorage.getItem(ANNOT_KEY) || '{}');
let _curAnnotTarget = null;

function _saveAnnot() { localStorage.setItem(ANNOT_KEY, JSON.stringify(_annotMap)); }
function _hideToolbar() { const tb = document.getElementById('annotToolbar'); if (tb) tb.style.display = 'none'; _curAnnotTarget = null; }

function applyAnnot(type) {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed || !_curAnnotTarget) return;
  const range = sel.getRangeAt(0);
  if (!_curAnnotTarget.contains(range.commonAncestorContainer)) return;

  if (type === 'clear') {
    _curAnnotTarget.querySelectorAll('mark.hl-yellow, mark.hl-green, strong.annot-bold').forEach(m => {
      const p = m.parentNode; while (m.firstChild) p.insertBefore(m.firstChild, m); p.removeChild(m);
    });
  } else if (type === 'bold') {
    const el = document.createElement('strong'); el.className = 'annot-bold';
    try { range.surroundContents(el); } catch(e) { el.appendChild(range.extractContents()); range.insertNode(el); }
  } else {
    const el = document.createElement('mark'); el.className = type === 'hl-yellow' ? 'hl-yellow' : 'hl-green';
    try { range.surroundContents(el); } catch(e) { el.appendChild(range.extractContents()); range.insertNode(el); }
  }
  const tr = _curAnnotTarget.closest('tr');
  const key = tr ? 'row_' + tr.dataset.idx : null;
  if (key) { _annotMap[key] = _curAnnotTarget.innerHTML; _saveAnnot(); }
  sel.removeAllRanges(); _hideToolbar();
}

// ── 修复：标注工具栏定位修正 (删除 window.scrollY) ──
document.addEventListener('mouseup', e => {
  const tb = document.getElementById('annotToolbar');
  if (tb && tb.contains(e.target)) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.toString().trim()) { _hideToolbar(); return; }

  const anchor = sel.anchorNode;
  const exEl = anchor && anchor.nodeType === 3 ? anchor.parentElement.closest('.example-jp') : anchor && anchor.closest && anchor.closest('.example-jp');
  if (!exEl) { _hideToolbar(); return; }

  _curAnnotTarget = exEl;
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  tb.style.display = 'flex';
  const left = Math.min(rect.left + rect.width/2 - 65, window.innerWidth - 138);
  tb.style.left = Math.max(8, left) + 'px';
  tb.style.top  = (rect.top - 45) + 'px'; 
});

document.addEventListener('mousedown', e => { const tb = document.getElementById('annotToolbar'); if (tb && !tb.contains(e.target)) _hideToolbar(); });

let currentMode = 'word';
let currentPage = 0;
const pageSize = 20;
let starredList = JSON.parse(localStorage.getItem('n1_stars_p9')) || [];
let _curAudio = null, _curBtn = null, _jpVoice = null;

function _initVoice() {
  if (_jpVoice) return;
  const all = window.speechSynthesis.getVoices();
  const jp = all.filter(v => v.lang.startsWith('ja'));
  _jpVoice = jp.find(v => /Kyoko|Otoya|Google 日本語|Haruka|Ichiro/i.test(v.name)) || jp[0] || null;
}
if (window.speechSynthesis.onvoiceschanged !== undefined) window.speechSynthesis.onvoiceschanged = _initVoice;
_initVoice();

function _stopAll() {
  if (_curAudio) { try { _curAudio.pause(); } catch(e){} _curAudio = null; }
  window.speechSynthesis.cancel();
  if (_curBtn) { _curBtn.classList.remove('playing'); _curBtn = null; }
}

function _playTTS(text, btn) {
  _initVoice(); btn.classList.add('playing'); _curBtn = btn;
  const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 0.88;
  if (_jpVoice) u.voice = _jpVoice;
  u.onend = () => { btn.classList.remove('playing'); if(_curBtn===btn) _curBtn=null; };
  window.speechSynthesis.speak(u);
}

function playAudio(text, btn, isSentence) {
  if (btn === _curBtn) { _stopAll(); return; }
  _stopAll();
  if (isSentence || text.length > 12) { _playTTS(text, btn); return; }
  btn.classList.add('playing'); _curBtn = btn;
  const url = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(text)}&le=jap&type=2`;
  const audio = new Audio(url); _curAudio = audio;
  let done = false;
  const fallback = () => { if (done) return; done = true; _curAudio = null; btn.classList.remove('playing'); _playTTS(text, btn); };
  audio.onended = () => { done = true; btn.classList.remove('playing'); if (_curBtn === btn) _curBtn = null; };
  audio.onerror = fallback;
  setTimeout(() => { if (!done) fallback(); }, 3000);
  audio.play().catch(fallback);
}

function buildTable() {
  const tbody = document.getElementById('tableBody'); tbody.innerHTML = '';
  const start = currentPage * pageSize; const end = Math.min(start + pageSize, VOCAB_DATA.length);
  const items = VOCAB_DATA.slice(start, end);
  document.getElementById('pageInfo').innerText = `${currentPage + 1} / ${Math.ceil(VOCAB_DATA.length/pageSize)}`;
  document.getElementById('prevBtn').disabled = (currentPage === 0);
  document.getElementById('nextBtn').disabled = (end >= VOCAB_DATA.length);

  items.forEach((item, i) => {
    const tr = document.createElement('tr'); tr.dataset.idx = start + i;
    const isS = starredList.includes(item[0]); if(isS) tr.classList.add('starred');
    const tdStar = document.createElement('td'); tdStar.style.textAlign = 'center';
    tdStar.innerHTML = `<div class="star-btn ${isS ? 'active' : ''}" onclick="toggleStar('${item[0]}')">★</div>`;
    tr.appendChild(tdStar);
    const tdNum = document.createElement('td'); tdNum.style.textAlign = 'center';
    tdNum.innerHTML = `<span style="color:#999;font-size:12px;">${start + i + 781}</span>`;
    tr.appendChild(tdNum);
    const tdWord = document.createElement('td'); tdWord.innerHTML = `<div class="word-jp">${item[0]}</div>`;
    tr.appendChild(tdWord);
    const tdReading = document.createElement('td'); tdReading.className = 'reading-cell';
    tdReading.innerHTML = `<div class="reading-big">${item[1]}</div>`;
    tr.appendChild(tdReading);
    const tdAnswer = document.createElement('td');
    const controlRow = document.createElement('div'); controlRow.style.display = "flex"; controlRow.style.gap = "8px"; controlRow.style.alignItems = "center";
    const wordAudioBtn = document.createElement('button'); wordAudioBtn.className = 'row-audio-btn'; wordAudioBtn.innerHTML = '🔊';
    // 修正：播放假名列
    wordAudioBtn.onclick = () => playAudio(item[1], wordAudioBtn); 
    const revealBtn = document.createElement('button'); revealBtn.className = 'reveal-btn'; revealBtn.textContent = '显示答案';
    controlRow.appendChild(wordAudioBtn); controlRow.appendChild(revealBtn);
    const answerBox = document.createElement('div'); answerBox.className = 'answer-box';
    answerBox.innerHTML = `<div class="meaning-zh">${item[2]}</div><div class="example-jp">${item[3]}</div><div class="example-zh">${item[4]}</div><div style="margin-top: 8px; display: flex; align-items: center; gap: 8px;"><button class="row-audio-btn" style="border-color:#1565c0; color:#1565c0;" id="sent_audio_${start+i}">🔊</button><span style="font-size:11px; color:#1565c0; font-weight:700;">例句发音</span></div>`;
    const exJpEl = answerBox.querySelector('.example-jp');
    if (exJpEl && _annotMap['row_'+(start+i)]) exJpEl.innerHTML = _annotMap['row_'+(start+i)];
    answerBox.querySelector(`#sent_audio_${start+i}`).onclick = function() { playAudio(item[3], this, true); };
    revealBtn.addEventListener('click', () => {
      if (answerBox.classList.contains('visible')) {
        answerBox.classList.remove('visible'); revealBtn.textContent = '显示答案';
        tr.querySelector('.reading-big')?.classList.remove('revealed'); tr.querySelector('.word-jp')?.classList.remove('revealed');
      } else {
        answerBox.classList.add('visible'); revealBtn.textContent = '隐藏';
        if (currentMode === 'word') tr.querySelector('.reading-big')?.classList.add('revealed'); else tr.querySelector('.word-jp')?.classList.add('revealed');
      }
    });
    tdAnswer.appendChild(controlRow); tdAnswer.appendChild(answerBox); tr.appendChild(tdAnswer); tbody.appendChild(tr);
  });
  applyMode();
}

window.toggleStar = function(word) { const idx = starredList.indexOf(word); if(idx > -1) starredList.splice(idx, 1); else starredList.push(word); localStorage.setItem('n1_stars_p9', JSON.stringify(starredList)); buildTable(); };
window.exportStars = function() { prompt("备份代码：", JSON.stringify(starredList)); };
window.importStars = function() { const d = prompt("粘贴代码："); if(d) { try{starredList = JSON.parse(d); localStorage.setItem('n1_stars_p9', d); buildTable();}catch(e){alert("导入格式有误");} } };

function applyMode() {
  document.getElementById('vocabTable').dataset.mode = currentMode;
  if (currentMode === 'word') document.getElementById('modeHint').innerHTML = '<strong>📖 漢字モード</strong>：单字看读音、意思、例句。「显示答案」确认。';
  else document.getElementById('modeHint').innerHTML = '<strong>🔤 読みモード</strong>：读音看汉字、意思、例句。「显示答案」确认。';
}
function changePage(step) { currentPage += step; buildTable(); window.scrollTo(0,0); }
document.querySelectorAll('.mode-btn').forEach(b => { b.addEventListener('click', () => { document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); currentMode = b.dataset.mode; applyMode(); }); });
document.getElementById('searchInput').addEventListener('input', function() { const q = this.value.trim().toLowerCase(); document.querySelectorAll('#tableBody tr').forEach(tr => { tr.style.display = (!q || tr.innerText.toLowerCase().includes(q)) ? '' : 'none'; }); });
document.getElementById('revealAllBtn').addEventListener('click', () => { document.querySelectorAll('#tableBody tr').forEach(tr => { if(tr.style.display !== 'none') { if (currentMode === 'word') tr.querySelector('.reading-big')?.classList.add('revealed'); else tr.querySelector('.word-jp')?.classList.add('revealed'); tr.querySelector('.answer-box')?.classList.add('visible'); tr.querySelector('.reveal-btn').textContent = '隐藏'; } }); });
document.getElementById('hideAllBtn').addEventListener('click', () => { document.querySelectorAll('.word-jp.revealed, .reading-big.revealed').forEach(el => el.classList.remove('revealed')); document.querySelectorAll('.answer-box.visible').forEach(el => { el.classList.remove('visible'); el.previousElementSibling.lastElementChild.textContent = '显示答案'; }); });

buildTable();
</script>
